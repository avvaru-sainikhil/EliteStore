<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elite Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f6f9;
}

.container{
width:500px;
background:white;
padding:60px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
text-align:center;
}

h1{
font-size:40px;
color:#111827;
margin-bottom:20px;
}

p{
font-size:17px;
color:#6b7280;
margin-bottom:35px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#111827;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#374151;
}

</style>
</head>

<body>

<div class="container">

<h1>Elite Store</h1>

<p>Professional shopping experience with modern cart system</p>

<form action="Shop.jsp">

<button>Enter Store</button>

</form>

</div>

</body>
</html>
